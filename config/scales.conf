# Per-app scaling configuration
# See CLAUDE.md for full documentation
#
# To find an app's toolkit: ldd $(which appname) | grep -Ei "qt|gtk"
# Electron apps are usually wrapper scripts — check with: head $(which appname)

[monitors]
# resolution_height = gnome_scaling_percentage
# Used by auto-switch daemon when monitors are plugged/unplugged
2160 = 150
1440 = 125
1080 = 100

[defaults]
# Per-toolkit default scale factors
# Apps with an empty scale value inherit from here
wine = 3.0
# qt = 1.0
# gtk = 1.0
# electron = 1.0

[apps]
# Format: app-name = scale_1080p / scale_4k : toolkit
# Or:     app-name = scale : toolkit               (single factor for all resolutions)
# Or:     app-name = : toolkit                      (use toolkit default from [defaults])
#
# Toolkits: gtk | qt | electron | wine
# Use 1.0 for no scaling adjustment
# The launcher auto-detects resolution and picks the right column

# Electron / Chromium apps
code          = 1.0 / 3.5 : electron
google-chrome = 1.0 / 1.2 : electron
# slack      = 1.0 / 1.5 : electron
# discord    = 1.0 / 1.4 : electron
# spotify    = 1.0 / 1.4 : electron

# Qt apps
# vlc        = 1.0 / 1.5 : qt
# obs        = 1.0 / 1.5 : qt
# virtualbox = 1.0 / 1.5 : qt

# Wine apps (empty scale = use wine default from [defaults])
notepad-plus-plus = : wine

# GTK apps (usually scale fine with GNOME, but just in case)
# gimp       = 1.0 / 1.0 : gtk
